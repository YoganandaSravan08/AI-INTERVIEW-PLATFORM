<!DOCTYPE html>
<html>
<head>
<title>Mock Interview</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10 " onload="loadQuestion()">

<h1 class="text-3xl mb-6">Mock Interview</h1>

<div class="bg-gray-800 p-6 rounded mb-6">

<h3>Question</h3>
<p id="question"></p>

</div>

<textarea id="answer"
class="w-full p-3 bg-gray-800 rounded"
placeholder="Type your answer"></textarea>

<button onclick="submitAnswer()"
class="bg-green-500 px-4 py-2 mt-4 rounded">

Submit Answer

</button>

<div id="feedback" class="mt-6 bg-gray-800 p-6 rounded"></div>

<script src="script.js"></script>

</body>
</html>
