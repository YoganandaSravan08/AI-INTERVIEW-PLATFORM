<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-lg w-96">

<h2 class="text-2xl mb-4 text-center">Verify Email</h2>

<input id="email" type="email" placeholder="Enter Email"
class="w-full p-2 mb-3 text-black rounded">

<input id="otp" type="text" placeholder="Enter OTP"
class="w-full p-2 mb-4 text-black rounded">

<button onclick="verifyOTP()"
class="w-full bg-blue-500 p-2 rounded hover:bg-blue-600">
Verify OTP
</button>

</div>

<script src="script.js"></script>

</body>
</html>
