<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="script.js"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded-lg w-80">

<h2 class="text-2xl mb-6 text-center">
Create Account
</h2>

<input id="name"
type="text"
placeholder="Name"
class="w-full p-2 mb-4 rounded bg-gray-700"
/>

<input id="email"
type="email"
placeholder="Email"
class="w-full p-2 mb-4 rounded bg-gray-700"
/>

<input id="password"
type="password"
placeholder="Password"
class="w-full p-2 mb-4 rounded bg-gray-700"
/>

<button
onclick="signup()"
class="w-full bg-blue-500 p-2 rounded hover:bg-blue-600">

Signup

</button>

<p class="text-center mt-4 text-sm">

Already have an account?

<a href="login.html" class="text-blue-400">
Login
</a>

</p>

</div>

</body>
</html>
